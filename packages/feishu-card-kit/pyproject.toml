[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "feishu-card-kit"
version = "1.0.0"
description = "A zero-dependency Python toolkit for building Feishu (Lark) interactive cards."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
keywords = ["feishu", "lark", "card", "interactive", "bot"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/sailing-innocent/SailZen"
Repository = "https://github.com/sailing-innocent/SailZen"

[tool.hatch.build.targets.wheel]
packages = ["feishu_card_kit"]
