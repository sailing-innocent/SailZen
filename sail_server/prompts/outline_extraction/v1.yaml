id: outline_extraction_v1
name: "大纲提取 - 基础版"
description: "从章节内容中提取情节大纲，识别主要情节点、事件类型和重要程度"
task_type: outline_extraction
version: "1.0"

system_prompt: |
  你是一位专业的文学分析师，擅长分析小说结构和情节发展。
  你的任务是从给定的章节内容中提取情节大纲。
  
  请严格按照要求的 JSON 格式输出分析结果。
  不要输出任何解释性文字，只输出 JSON。

user_prompt_template: |
  ## 任务：提取小说章节的情节大纲
  
  ### 背景信息
  - 作品名称：{{work_title}}
  - 章节范围：{{chapter_range}}
  {{#if known_characters}}
  - 已知人物：{{known_characters}}
  {{/if}}
  
  ### 章节内容
  {{chapter_contents}}
  
  ### 分析要求
  1. 识别主要情节点（plot points），每个情节点应该是故事发展的关键节点
  2. 标注情节类型：
     - conflict（冲突）：角色间或角色与环境的对抗
     - revelation（揭示）：重要信息的披露
     - climax（高潮）：情节的最高点
     - resolution（解决）：问题的解决
     - setup（铺垫）：为后续情节做准备
  3. 评估每个情节点的重要程度：
     - critical（关键）：影响整个故事走向
     - major（主要）：重要的情节发展
     - normal（普通）：一般性情节
     - minor（次要）：补充性内容
  4. 识别涉及的人物
  5. 提取关键原文作为证据（50-200字）
  
  ### 输出格式
  请以 JSON 格式输出，结构如下：
  
  ```json
  {
    "plot_points": [
      {
        "title": "情节标题（简洁概括）",
        "type": "conflict|revelation|climax|resolution|setup",
        "importance": "critical|major|normal|minor",
        "summary": "简要描述该情节点（50-100字）",
        "chapter_number": 1,
        "evidence": "原文引用，支持该情节点的关键段落",
        "characters": ["人物1", "人物2"]
      }
    ],
    "overall_summary": "本段章节的整体概述（100-200字）"
  }
  ```

output_schema:
  type: object
  properties:
    plot_points:
      type: array
      items:
        type: object
        properties:
          title:
            type: string
            description: "情节标题"
          type:
            type: string
            enum: ["conflict", "revelation", "climax", "resolution", "setup"]
          importance:
            type: string
            enum: ["critical", "major", "normal", "minor"]
          summary:
            type: string
            description: "简要描述（50-100字）"
          chapter_number:
            type: integer
          evidence:
            type: string
            description: "原文引用（50-200字）"
          characters:
            type: array
            items:
              type: string
        required: ["title", "type", "importance", "summary"]
    overall_summary:
      type: string
      description: "本段落的整体概述"
  required: ["plot_points", "overall_summary"]

example_input: |
  work_title: 示例小说
  chapter_range: 第1章-第3章
  chapter_contents: |
    ### 第一章 初遇
    
    李明走在回家的路上，突然看见前方有一个人倒在地上...

example_output: |
  {
    "plot_points": [
      {
        "title": "李明救助路人",
        "type": "setup",
        "importance": "major",
        "summary": "李明在回家途中发现有人倒地，出于善心上前救助，这一行为为后续故事埋下伏笔。",
        "chapter_number": 1,
        "evidence": "李明走在回家的路上，突然看见前方有一个人倒在地上...",
        "characters": ["李明"]
      }
    ],
    "overall_summary": "第一章至第三章讲述了李明的日常生活，以及他偶然救助路人的经历，为后续故事发展做了铺垫。"
  }
